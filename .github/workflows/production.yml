name: Deploy Frontend

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}/live
  STAGING_PATH: ${{ secrets.DEPLOY_PATH }}/staging-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v5


      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # 4. Create env file (Vite uses VITE_)
      - name: Create .env.production
        run: |
          echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" >> .env.production
          echo "VITE_SITE_URL=${{ secrets.VITE_SITE_URL }}" >> .env.production
          echo "VITE_CATCHPA_SITE_KEY=${{ secrets.VITE_CATCHPA_SITE_KEY }}" >> .env.production
          echo "VITE_IDLE_LOGOUT_MINUTES=${{ secrets.VITE_IDLE_LOGOUT_MINUTES }}" >> .env.production

      # 5. Build project
      - name: Build project
        run: npm run build

      # 6. Ensure dist exists
      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed: dist folder not found"
            exit 1
          fi

      # 7. Create TAR
      - name: Create archive
        run: tar -czf build.tar.gz dist

      # 8. Create staging dir
      - name: Create staging directory
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p "${{ env.STAGING_PATH }}"

      # 9. Upload archive
      - name: Upload build archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "build.tar.gz"
          target: "${{ env.STAGING_PATH }}/"

      # 10. Deploy
      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -eux

            cd "${{ env.STAGING_PATH }}"

            tar -xzf build.tar.gz
            rm build.tar.gz

            test -s dist/index.html

            mkdir -p "${{ env.DEPLOY_PATH }}"

            # Atomic replace
            rm -rf "${{ env.DEPLOY_PATH }}"
            mv dist "${{ env.DEPLOY_PATH }}"

            # Cleanup
            cd "$(dirname "${{ env.DEPLOY_PATH }}")"
            rm -rf staging-*

            # Reload nginx
            sudo systemctl reload nginx