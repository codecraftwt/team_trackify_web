name: Deploy Frontend

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
  STAGING_PATH: ${{ secrets.DEPLOY_PATH }}-staging-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v5


      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # 4. Create env file (Vite uses VITE_)
      - name: Create .env.production
        run: |
          echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" >> .env.production
          echo "VITE_SITE_URL=${{ secrets.VITE_SITE_URL }}" >> .env.production
          echo "VITE_CATCHPA_SITE_KEY=${{ secrets.VITE_CATCHPA_SITE_KEY }}" >> .env.production
          echo "VITE_IDLE_LOGOUT_MINUTES=${{ secrets.VITE_IDLE_LOGOUT_MINUTES }}" >> .env.production

      # 5. Build project
      - name: Build project
        run: npm run build

      # 6. Ensure dist exists
      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed: dist folder not found"
            exit 1
          fi

      # 7. Create staging directory on server
      - name: Create staging directory
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.NEW_SERVER_CI_CD_SECRET_KEY }}
          script: |
            mkdir -p "${{ env.STAGING_PATH }}"

      # 8. Upload build files
      - name: Upload dist folder
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.NEW_SERVER_CI_CD_SECRET_KEY }}
          source: "dist/*"
          target: ${{ env.STAGING_PATH }}

      # 9. Debug staging (optional but useful)
      - name: Debug staging contents
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.NEW_SERVER_CI_CD_SECRET_KEY }}
          script: |
            echo "Staging contents:"
            ls -lah "${{ env.STAGING_PATH }}"



      # 10. Sync to production
      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.NEW_SERVER_CI_CD_SECRET_KEY }}
          script: |
            set -eux

            # Ensure rsync exists
            command -v rsync >/dev/null 2>&1 || {
              echo "rsync is required on server"
              exit 1
            }

            # Validate build
            test -f "${{ env.STAGING_PATH }}/index.html" || {
              echo "Build invalid: index.html missing"
              exit 1
            }

            mkdir -p "${{ env.DEPLOY_PATH }}"

            rsync -a --delete \
              --chmod=Du=rwx,Dg=rx,Do=rx,Fu=rw,Fg=r,Fo=r \
              "${{ env.STAGING_PATH }}/" "${{ env.DEPLOY_PATH }}/"

            # Cleanup
            rm -rf "${{ env.STAGING_PATH }}"